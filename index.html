    <title>Sublurker | Reddit For Agencies</title>
    <meta name="description" content="Don't let your next client slip away. Learn how to automatically pipe high-intent Reddit conversations directly into your team's Slack or Discord using a keyword tracker."/>
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [{
    "@type": "Question",
    "name": "Is this compliant with Reddit's rules?",
    "acceptedAnswer": {
      "@type": "Answer",
      "text": "Yes. sublurker uses public search data and official endpoints. We do not automate replies or spam users; we simply alert you when a relevant conversation is happening so you can manually jump in and provide value."
    }
  },{
    "@type": "Question",
    "name": "How fast are the alerts?",
    "acceptedAnswer": {
      "@type": "Answer",
      "text": "On our Growth and Scale plans, we poll for your keywords constantly. You can expect a Slack notification or email within 60-120 seconds of the post going live on Reddit."
    }
  },{
    "@type": "Question",
    "name": "Can I track specific subreddits or the whole site?",
    "acceptedAnswer": {
      "@type": "Answer",
      "text": "Both! You can set a tracker to look at all of Reddit, or narrow it down to specific communities (e.g., only tracking \"SEO agency\" inside of r/SaaS and r/Entrepreneur)"
    }
  },{
    "@type": "Question",
    "name": "Can I cancel my subscription at any time?",
    "acceptedAnswer": {
      "@type": "Answer",
      "text": "Yes. sublurker is a month-to-month service. You can cancel your subscription at any time directly from your dashboard with two clicks, no questions asked."
    }
  }]
}
</script>
